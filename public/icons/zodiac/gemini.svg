<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="star-glow-gemini" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg-grad-gemini" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0.98"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="99" fill="url(#bg-grad-gemini)" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
  <!-- Background stars (tiny decorative) -->
  <circle cx="30" cy="40" r="0.8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="160" cy="30" r="0.7" fill="rgba(255,255,255,0.25)"/>
  <circle cx="170" cy="150" r="0.9" fill="rgba(255,255,255,0.2)"/>
  <circle cx="25" cy="155" r="0.6" fill="rgba(255,255,255,0.3)"/>
  <circle cx="180" cy="80" r="0.7" fill="rgba(255,255,255,0.2)"/>
  <!-- Constellation lines -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="0.8" stroke-linecap="round">
    <line x1="80" y1="80" x2="95" y2="60"/>
    <line x1="80" y1="80" x2="130" y2="120"/>
    <line x1="130" y1="120" x2="110" y2="100"/>
  </g>
  <!-- Stars -->
  <!-- Primary star: Pollux -->
  <circle cx="80" cy="80" r="4.5" fill="#FFD700" filter="url(#star-glow-gemini)"/>
  <!-- Secondary star: Castor -->
  <circle cx="95" cy="60" r="4" fill="rgba(255,215,0,0.8)"/>
  <!-- Secondary star: Alhena -->
  <circle cx="130" cy="120" r="3" fill="rgba(255,215,0,0.8)"/>
  <!-- Tertiary stars -->
  <circle cx="110" cy="100" r="2.5" fill="rgba(255,215,0,0.8)"/>
  <circle cx="65" cy="130" r="2" fill="rgba(255,255,255,0.6)"/>
</svg>