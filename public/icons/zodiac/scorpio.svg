<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="star-glow-scorpio" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg-grad-scorpio" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0.98"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="99" fill="url(#bg-grad-scorpio)" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
  <!-- Background stars (tiny decorative) -->
  <circle cx="30" cy="40" r="0.8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="160" cy="30" r="0.7" fill="rgba(255,255,255,0.25)"/>
  <circle cx="170" cy="150" r="0.9" fill="rgba(255,255,255,0.2)"/>
  <circle cx="25" cy="155" r="0.6" fill="rgba(255,255,255,0.3)"/>
  <circle cx="180" cy="80" r="0.7" fill="rgba(255,255,255,0.2)"/>
  <!-- Constellation lines -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="0.8" stroke-linecap="round">
    <line x1="80" y1="80" x2="70" y2="95"/>
    <line x1="70" y1="95" x2="55" y2="110"/>
    <line x1="80" y1="80" x2="100" y2="120"/>
    <line x1="100" y1="120" x2="130" y2="145"/>
    <line x1="130" y1="145" x2="150" y2="160"/>
  </g>
  <!-- Stars -->
  <!-- Primary star: Antares -->
  <circle cx="100" cy="120" r="5.5" fill="#FFD700" filter="url(#star-glow-scorpio)" opacity="0.9"/>
  <!-- Secondary stars -->
  <circle cx="150" cy="160" r="4" fill="rgba(255,215,0,0.8)"/>
  <circle cx="80" cy="80" r="3.5" fill="rgba(255,215,0,0.8)"/>
  <circle cx="130" cy="145" r="3" fill="rgba(255,215,0,0.8)"/>
  <circle cx="70" cy="95" r="3" fill="rgba(255,215,0,0.8)"/>
  <!-- Tertiary stars -->
  <circle cx="55" cy="110" r="2" fill="rgba(255,255,255,0.6)"/>
</svg>
